<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

svg{
    width:100%;
    height:100%;
}
</style>

</head>

<body>

<svg viewBox="0 0 100 100" preserveAspectRatio="none">

```
<rect
    id="fondo"
    x="0"
    y="0"
    width="100"
    height="100"
    fill="#FFFFFF"
    fill-opacity="0">
</rect>
```

</svg>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxHHlu-hBr8ytcu084bJ3ebxniyXoEI-vOG0wWvGGBIPmjkeX0hU6-BIbeRvIaNgAQYdg/exec";

const params = new URLSearchParams(window.location.search);

const LOTE = params.get("lote");

const fondo = document.getElementById("fondo");

async function actualizarColor(){

    try{

        const response = await fetch(
            API_URL + "?t=" + Date.now(),
            {
                cache: "no-store"
            }
        );

        const datos = await response.json();

        const fila = datos.find(item => {

            const idLote = String(item.ID_LOTE || "")
                .trim()
                .replace(/\s+/g," ");

            const loteBuscado = String(LOTE || "")
                .trim()
                .replace(/\s+/g," ");

            return idLote === loteBuscado;

        });

        if(!fila){

            console.warn(
                "Lote no encontrado:",
                LOTE
            );

            return;
        }

        const color =
            String(fila.COLOR || "FFFF00")
            .replace("#","")
            .trim();

        const opacidad =
            String(fila.OPACIDAD || "0.30")
            .trim();

        fondo.setAttribute(
            "fill",
            "#" + color
        );

        fondo.setAttribute(
            "fill-opacity",
            opacidad
        );

        console.log(
            "Actualizado:",
            fila.ID_LOTE,
            fila.ESTADO,
            "#" + color,
            opacidad
        );

    }
    catch(error){

        console.error(
            "Error:",
            error
        );

    }

}

actualizarColor();

window.recargarEstadoLote = function(){

    actualizarColor();

};

window.recargarEstadoLote = function(){

    console.log("Recargando lote");

    actualizarColor();

};

</script>

</body>
</html>
